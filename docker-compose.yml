version: '3.8'

services:
  # =========================
  # Application Services
  # =========================

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fmcg-api
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./ml_models:/app/ml_models
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
      - monitoring

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fmcg-worker
    command: ["python", "-m", "app.workers.worker"]
    env_file:
      - .env.docker
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./ml_models:/app/ml_models
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
      - monitoring

  # =========================
  # Database Services
  # =========================

  postgres:
    image: postgres:16-alpine
    container_name: fmcg-postgres
    environment:
      POSTGRES_DB: fmcg_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d fmcg_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: fmcg-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: fmcg-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - backend

  # =========================
  # Monitoring Stack
  # =========================

  loki:
    image: grafana/loki:2.9.0
    container_name: fmcg-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - monitoring

  promtail:
    image: grafana/promtail:2.9.0
    container_name: fmcg-promtail
    volumes:
      - ./logs:/var/log/fmcg
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: fmcg-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    restart: unless-stopped
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: fmcg-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - monitoring

# =========================
# Volumes
# =========================

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  grafana_data:
  prometheus_data:

# =========================
# Networks
# =========================

networks:
  backend:
    driver: bridge

  monitoring:
    driver: bridge